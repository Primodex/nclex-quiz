<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kyle Ch 24/25/26 — NCLEX Study Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:ital,wght@0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--card:#1A1D27;--card-hover:#222632;--border:#2A2E3A;--accent:#6C9CFF;--accent-glow:rgba(108,156,255,.15);--accent-soft:#4A7AE0;--correct:#34D399;--correct-bg:rgba(52,211,153,.08);--correct-border:rgba(52,211,153,.3);--incorrect:#F87171;--incorrect-bg:rgba(248,113,113,.08);--incorrect-border:rgba(248,113,113,.3);--text:#E8EAF0;--text-dim:#8B90A0;--text-muted:#5A5F72;--sata:#C084FC;--sata-bg:rgba(192,132,252,.08);--case:#FBBF24;--case-bg:rgba(251,191,36,.08);--ngn:#FB923C;--ngn-bg:rgba(251,146,60,.08);--flag:#F59E0B;--ch24:#F472B6;--ch25:#34D399;--ch26:#60A5FA;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;overflow-x:hidden}
.app{max-width:840px;margin:0 auto;padding:24px 20px calc(80px + var(--safe-bottom))}
.header{text-align:center;padding:36px 0 28px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:var(--accent);border-radius:2px}
.header h1{font-family:'Fraunces',serif;font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.header .source{color:var(--text-dim);font-size:13px;margin-bottom:4px}
.header .source-detail{color:var(--text-muted);font-size:11.5px;font-style:italic}

.start-screen{animation:su .4s ease}
.mode-section{margin-bottom:28px}
.mode-section h2{font-family:'Fraunces',serif;font-size:18px;color:var(--text);margin-bottom:8px;font-weight:700}
.mode-section .sub{font-size:12.5px;color:var(--text-dim);margin-bottom:14px}

/* Chapter cards */
.chapter-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:24px}
.chapter-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s ease;display:flex;align-items:center;gap:14px;min-height:72px;position:relative;overflow:hidden}
.chapter-card:active{transform:scale(.98)}
@media(hover:hover){.chapter-card:hover{background:var(--card-hover);border-color:var(--accent)}}
.chapter-card.selected{background:var(--accent-glow);border-color:var(--accent)}
.chapter-card .accent-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.chapter-checkbox{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.chapter-card.selected .chapter-checkbox{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.chapter-info{flex:1;min-width:0}
.chapter-num{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
.chapter-title{font-family:'Fraunces',serif;font-size:15.5px;font-weight:700;line-height:1.3;margin-bottom:3px}
.chapter-meta{font-size:11.5px;color:var(--text-muted)}

/* Mode buttons */
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s ease;text-align:left;min-height:88px;display:flex;flex-direction:column;gap:4px}
.mode-card:active{transform:scale(.98)}
@media(hover:hover){.mode-card:hover{border-color:var(--accent);background:var(--card-hover)}}
.mode-card.selected{background:var(--accent-glow);border-color:var(--accent)}
.mode-card-title{font-family:'Fraunces',serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.mode-card-icon{font-size:14px}
.mode-card-desc{font-size:11.5px;color:var(--text-dim);line-height:1.45}

/* Quick actions */
.topic-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.btn-text{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;min-height:36px}
.btn-text:active{transform:scale(.96)}
@media(hover:hover){.btn-text:hover{border-color:var(--accent);color:var(--accent)}}

/* Start bar */
.start-bar{background:rgba(26,29,39,.95);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;bottom:calc(16px + var(--safe-bottom));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:10}
.start-info{font-size:13px;color:var(--text-dim);flex:1;min-width:140px}
.start-info strong{color:var(--text);font-weight:700}
.btn-start{background:var(--accent);color:var(--bg);border:none;padding:13px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;min-height:44px;white-space:nowrap}
.btn-start:active{transform:scale(.96)}
.btn-start:disabled{opacity:.4;cursor:not-allowed}

/* Quiz UI - shared with exam sim */
.quiz-top{display:flex;align-items:center;gap:12px;margin:20px 0 16px;flex-wrap:wrap}
.timer{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.timer.warn{border-color:var(--flag);color:var(--flag)}
.timer.crit{border-color:var(--incorrect);color:var(--incorrect);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.pbc{flex:1;display:flex;align-items:center;gap:10px;min-width:200px}
.pt{flex:1;height:5px;background:var(--border);border-radius:6px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),#A78BFA);border-radius:6px;transition:width .5s ease}
.ptx{font-size:12.5px;color:var(--text-dim);font-weight:600;white-space:nowrap}
.btn-quit{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;min-height:30px}
.btn-quit:active{transform:scale(.95)}

.sb{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.sp{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600}
.sp.cp{background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct-border)}
.sp.ip{background:var(--incorrect-bg);color:var(--incorrect);border:1px solid var(--incorrect-border)}
.sp.rp{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(108,156,255,.2)}
.sp.fp{background:rgba(245,158,11,.08);color:var(--flag);border:1px solid rgba(245,158,11,.25)}

.qc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;animation:su .35s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qm{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:6px;white-space:nowrap}
.badge-sata{background:var(--sata-bg);color:var(--sata);border:1px solid rgba(192,132,252,.25)}
.badge-case{background:var(--case-bg);color:var(--case);border:1px solid rgba(251,191,36,.25)}
.badge-ngn{background:var(--ngn-bg);color:var(--ngn);border:1px solid rgba(251,146,60,.25)}
.badge-hard{background:rgba(248,113,113,.08);color:var(--incorrect);border:1px solid rgba(248,113,113,.2)}
.bt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:6px;border:1px solid;white-space:nowrap}
.btn-flag{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;min-height:28px}
.btn-flag.flagged{background:rgba(245,158,11,.1);border-color:var(--flag);color:var(--flag)}
.btn-flag:active{transform:scale(.95)}

.csb{background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.15);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13.5px;line-height:1.7}
.csb .cl{font-weight:700;color:var(--case);font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.qn{font-family:'Fraunces',serif;font-size:13px;color:var(--text-muted);margin-bottom:6px}
.qt{font-size:15px;font-weight:500;line-height:1.7;margin-bottom:4px}
.si{font-size:12px;color:var(--sata);font-weight:600;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.ob{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;line-height:1.6;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .15s ease;width:100%;min-height:52px}
.ob:active:not(.dis){transform:scale(.99)}
@media(hover:hover){.ob:hover:not(.dis){background:var(--accent-glow);border-color:var(--accent)}}
.ob .lt{min-width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;border:1.5px solid var(--border);flex-shrink:0;margin-top:1px}
.ob.sel{background:var(--accent-glow);border-color:var(--accent)}
.ob.sel .lt{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ob.ca{background:var(--correct-bg);border-color:var(--correct-border)}
.ob.ca .lt{background:var(--correct);color:var(--bg);border-color:var(--correct)}
.ob.ia{background:var(--incorrect-bg);border-color:var(--incorrect-border)}
.ob.ia .lt{background:var(--incorrect);color:var(--bg);border-color:var(--incorrect)}
.ob.dis{cursor:default;opacity:.85}
.ob.dis:active{transform:none}

.ar{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.bs,.bn{padding:13px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;min-height:46px}
.bs:active:not(:disabled),.bn:active{transform:scale(.97)}
.bs{background:var(--accent);color:var(--bg);flex:1}
.bs:disabled{opacity:.4;cursor:not-allowed}
.bn{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-prev{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:13px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;min-height:46px}
.btn-prev:disabled{opacity:.3;cursor:not-allowed}
.btn-prev:active:not(:disabled){transform:scale(.97)}

.rb{margin-top:16px;padding:16px;border-radius:12px;border:1px solid var(--border);background:rgba(108,156,255,.04);animation:su .3s ease}
.rb h4{font-family:'Fraunces',serif;font-size:14px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.rb .src-tag{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;background:var(--card);padding:3px 8px;border-radius:5px;border:1px solid var(--border)}
.rb p{font-size:13.5px;line-height:1.7;color:var(--text-dim)}

/* Navigator */
.nav-toggle{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(108,156,255,.4);z-index:50;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;animation:fadeIn .2s ease;display:none}
.nav-overlay.show{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.nav-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 18px calc(24px + var(--safe-bottom));z-index:100;max-height:80vh;overflow-y:auto;animation:slideUp .25s ease;display:none}
.nav-panel.show{display:block}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.nav-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.nav-header h3{font-family:'Fraunces',serif;font-size:17px}
.nav-close{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:4px 8px}
.nav-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-size:11px;color:var(--text-dim)}
.nav-legend-item{display:flex;align-items:center;gap:4px}
.nav-legend-box{width:12px;height:12px;border-radius:3px}
.nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:6px}
.nav-cell{aspect-ratio:1;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;position:relative}
.nav-cell.answered{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
.nav-cell.flagged{border-color:var(--flag)}
.nav-cell.flagged::after{content:'';position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--flag)}
.nav-cell.current{box-shadow:0 0 0 2px var(--accent);background:var(--accent);color:var(--bg);border-color:var(--accent)}
.nav-cell:active{transform:scale(.92)}
.nav-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.btn-submit-exam{flex:1;background:var(--correct);color:var(--bg);border:none;padding:12px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;min-height:42px}

/* Final */
.fs{text-align:center;padding:40px 20px;animation:su .5s ease}
.fs h2{font-family:'Fraunces',serif;font-size:24px;margin-bottom:6px}
.fsc{font-size:56px;font-weight:800;font-family:'Fraunces',serif;background:linear-gradient(135deg,var(--accent),#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:14px 0;line-height:1}
.fs p{color:var(--text-dim);font-size:14px;margin-bottom:20px;padding:0 8px}
.fs-stats{display:flex;justify-content:center;gap:20px;margin:18px 0;flex-wrap:wrap}
.fs-stat{text-align:center}
.fs-stat-num{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--text)}
.fs-stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px}
.fs-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.br{padding:13px 24px;border-radius:10px;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;min-height:46px}
.br:active{transform:scale(.97)}
.br-sec{padding:13px 24px;border-radius:10px;background:transparent;color:var(--text);border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;min-height:46px}
.br-sec:active{transform:scale(.97)}
.tbd{margin-top:24px;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.tbd h3{font-family:'Fraunces',serif;font-size:16px;color:var(--accent);margin-bottom:12px;text-align:center}
.tr{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.tr:last-child{border-bottom:none}
.tl{color:var(--text-dim);display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.ts{font-weight:700;white-space:nowrap;flex-shrink:0}
.topic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}

/* Review */
.review-list{margin-top:20px;display:flex;flex-direction:column;gap:12px}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s ease}
.review-item:active{transform:scale(.99)}
.review-item.correct{border-left:3px solid var(--correct)}
.review-item.incorrect{border-left:3px solid var(--incorrect)}
.review-item.unanswered{border-left:3px solid var(--text-muted);opacity:.7}
.review-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.review-num{font-family:'Fraunces',serif;font-weight:700;font-size:13px}
.review-q{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.review-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:2px 8px;border-radius:5px}
.review-status.correct{background:var(--correct-bg);color:var(--correct)}
.review-status.incorrect{background:var(--incorrect-bg);color:var(--incorrect)}
.review-status.unanswered{background:rgba(139,144,160,.1);color:var(--text-muted)}

/* Submit modal */
.summary-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.summary-modal.show{display:flex}
.summary-content{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:420px;width:100%;animation:su .3s ease}
.summary-content h3{font-family:'Fraunces',serif;font-size:19px;margin-bottom:14px}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.summary-stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.summary-stat-num{font-family:'Fraunces',serif;font-size:22px;font-weight:700}
.summary-stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px}
.summary-warn{background:rgba(248,113,113,.08);border:1px solid var(--incorrect-border);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12.5px;color:var(--incorrect)}
.summary-actions{display:flex;gap:10px}
.summary-actions button{flex:1;padding:12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;min-height:44px}

@media(max-width:600px){
  .app{padding:16px 14px calc(72px + var(--safe-bottom))}
  .header{padding:24px 0 22px}
  .header h1{font-size:22px}
  .mode-section{margin-bottom:24px}
  .mode-section h2{font-size:16px}
  .mode-cards{gap:8px}
  .mode-card{padding:12px;min-height:80px}
  .mode-card-title{font-size:13px}
  .mode-card-desc{font-size:11px}
  .chapter-card{padding:14px;gap:12px;min-height:64px}
  .chapter-title{font-size:14.5px}
  .start-bar{padding:12px 14px;border-radius:12px}
  .start-info{font-size:12.5px;width:100%;text-align:center;order:1}
  .btn-start{width:100%;order:2}
  .quiz-top{gap:8px}
  .timer{font-size:12px;padding:5px 10px}
  .pbc{min-width:140px}
  .qc{padding:18px 16px;border-radius:14px}
  .qm{gap:5px}
  .badge,.bt{font-size:9.5px;padding:3px 7px}
  .csb{padding:12px 14px;font-size:13px}
  .qn{font-size:12px}
  .qt{font-size:14.5px}
  .ob{padding:12px;font-size:13.5px;line-height:1.55;gap:10px;min-height:48px}
  .ob .lt{min-width:24px;height:24px;font-size:10.5px}
  .ar{gap:8px}
  .bs,.bn{padding:12px 18px;font-size:13.5px;width:100%}
  .btn-prev{width:100%}
  .rb{padding:14px}
  .rb p{font-size:13px}
  .nav-toggle{width:46px;height:46px;font-size:16px;right:16px;bottom:calc(16px + var(--safe-bottom))}
  .nav-grid{grid-template-columns:repeat(8,1fr);gap:5px}
  .nav-cell{font-size:10.5px}
  .fs{padding:24px 8px}
  .fs h2{font-size:21px}
  .fsc{font-size:48px}
  .fs-btns{flex-direction:column;gap:8px;width:100%}
  .br,.br-sec{width:100%}
  .summary-content{padding:20px}
